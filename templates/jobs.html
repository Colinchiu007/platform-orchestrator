{% extends "base.html" %}
{% block title %}任务列表 — Platform Orchestrator{% endblock %}
{% block content %}
<h1>任务列表</h1>

<div class="tabs">
    <a href="/jobs?type=video" class="tab {% if type == 'video' %}active{% endif %}">视频任务</a>
    <a href="/jobs?type=publish" class="tab {% if type == 'publish' %}active{% endif %}">发布任务</a>
</div>

<div id="job-list" hx-get="/api/jobs/{{ type or 'video' }}" hx-trigger="load, every 10s" hx-swap="innerHTML">
    加载中...
</div>
{% endblock %}
